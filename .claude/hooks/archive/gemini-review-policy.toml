# gemini-review-policy.toml
# Project-scoped Gemini CLI policy for review agents.
# Used with: --approval-mode yolo --policy <this-file>
#
# Yolo mode allows everything by default. This policy denies specific
# write and destructive operations so reviewers can read and explore freely
# but cannot modify files or mutate the repository.

# Block file write operations
[[rule]]
toolName = ["write_file", "replace"]
decision = "deny"
priority = 100
denyMessage = "Write operations are blocked during code review."

# Block destructive git commands
[[rule]]
toolName = "run_shell_command"
commandPrefix = ["git commit", "git push", "git checkout", "git reset", "git rebase", "git rm", "git clean", "git merge", "git tag"]
decision = "deny"
priority = 100
denyMessage = "Destructive git operations are blocked during code review."
