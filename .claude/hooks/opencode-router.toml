version = 1

[defaults]
startup_timeout_seconds = 10

[profiles.review_gpt54]
agent = "code-reviewer"
provider = "poe"
model = "openai/gpt-5.4"
timeout_seconds = 3600

[profiles.implementer_sonnet]
agent = "build"
provider = "poe"
model = "anthropic/claude-sonnet-4.6"
timeout_seconds = 3600

[[routes]]
name = "superpowers-code-review"
enabled = true
match_subagent = "code-reviewer"
profile = "review_gpt54"

[[routes]]
name = "superpowers-code-review-prefixed"
enabled = true
match_subagent = "superpowers:code-reviewer"
profile = "review_gpt54"

[[routes]]
name = "superpowers-spec-review"
enabled = true
match_subagent = "general-purpose"
match_description_prefix = "Review spec compliance"
profile = "review_gpt54"

[[routes]]
name = "superpowers-implementer"
enabled = true
match_subagent = "general-purpose"
match_description_prefix = "You are implementing"
profile = "implementer_sonnet"
